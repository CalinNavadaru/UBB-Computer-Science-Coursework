plugins {
    id 'java'
    id 'application'
}

group = 'cs.ubbcluj.ro'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

application {
    mainClassName "cs.ubbcluj.ro.Main"
}

test {
    useJUnitPlatform()
}